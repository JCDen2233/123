<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Isometric Game</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
        <div id="coords">X: 0, Y: 0</div>
        <div id="fps">FPS: 0</div>
    </div>
    <div id="mobileControls">
        <div class="d-pad">
            <button id="btnUp" class="d-btn" aria-label="Up">&#9650;</button>
            <button id="btnLeft" class="d-btn" aria-label="Left">&#9664;</button>
            <button id="btnRight" class="d-btn" aria-label="Right">&#9654;</button>
            <button id="btnDown" class="d-btn" aria-label="Down">&#9660;</button>
        </div>
    </div>
    <div id="joinScreen">
        <div class="join-box">
            <h2>Isometric Game</h2>
            <input type="text" id="nicknameInput" placeholder="Enter nickname" maxlength="15">
            <button id="joinBtn">Join Game</button>
        </div>
    </div>
    <div id="chatContainer">
        <div id="chatMessages"></div>
        <input type="text" id="chatInput" placeholder="Type message..." maxlength="100">
        <button id="sendBtn">Send</button>
    </div>
    <div id="terrainTools">
        <button id="btnHill" class="tool-btn">Hill</button>
        <button id="btnPit" class="tool-btn">Pit</button>
        <button id="btnWater" class="tool-btn">Water</button>
        <span id="toolStatus">Select tool</span>
    </div>
    <div id="connectionStatus" class="hidden">
        <span id="connectionIndicator"></span>
        <span id="connectionText">Connecting...</span>
    </div>
    <div id="settingsPanel" class="ui-panel hidden">
        <h3>Настройки</h3>
        <div class="setting-row">
            <label for="volumeSlider">Громкость:</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="50">
            <span id="volumeValue">50%</span>
        </div>
        <div class="setting-row">
            <label for="cameraSensitivity">Чувствительность камеры:</label>
            <input type="range" id="cameraSensitivity" min="1" max="10" value="5">
            <span id="sensitivityValue">5</span>
        </div>
        <button id="btnCloseSettings">Закрыть</button>
    </div>
    <div id="loadingScreen">
        <div class="loading-box">
            <h2>Загрузка...</h2>
            <div class="loading-bar">
                <div id="loadingProgress" class="loading-progress"></div>
            </div>
            <p id="loadingText">Инициализация...</p>
        </div>
    </div>
    <div id="gameUI">
        <!-- Инвентарь -->
        <div id="inventoryContainer" class="ui-panel hidden">
            <h3>Инвентарь</h3>
            <div id="inventoryGrid"></div>
            <div id="hotbarGrid"></div>
        </div>
        
        <!-- Журнал квестов -->
        <div id="questLogContainer" class="ui-panel hidden">
            <h3>Квесты</h3>
            <div id="questList"></div>
        </div>
        
        <!-- Диалоговое окно -->
        <div id="dialogueContainer" class="ui-panel hidden">
            <div id="dialogueName"></div>
            <div id="dialogueText"></div>
            <div id="dialogueOptions"></div>
            <button id="closeDialogue">Закрыть</button>
        </div>
        
        <!-- Уведомления -->
        <div id="notifications"></div>
        
        <!-- Эффекты урона -->
        <div id="damageOverlay" class="hidden"></div>
        <div id="deathScreen" class="hidden">
            <h2>ВЫ ПОГИБЛИ</h2>
            <p>Возрождение через <span id="respawnTimer">5</span> сек...</p>
        </div>
    </div>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script src="/static/js/heightmap.js"></script>
    <script src="/static/js/terrainBuilder.js"></script>
    <script src="/static/js/mapEditor.js"></script>
    <script src="/static/js/iso.js"></script>
    <script src="/static/js/map.js"></script>
    <script src="/static/js/entities.js"></script>
    <script src="/static/js/entities_extra.js"></script>
    <script src="/static/js/inventory.js"></script>
    <script src="/static/js/particles.js"></script>
    <script src="/static/js/audio.js"></script>
    <script src="/static/js/input.js"></script>
    <script src="/static/js/camera.js"></script>
    <script src="/static/js/renderer.js"></script>
    <script src="/static/js/network.js"></script>
    <script src="/static/js/hud.js"></script>
    <script src="/static/js/game_extra.js"></script>
    <script src="/static/js/game.js"></script>
</body>
</html>
